# Echo -- a friendly example bot that greets, affirms, and repeats things back
# with a little flourish. One of two sample personalities (with Mimic) shipped to
# demonstrate every feature. Copy this file, rename it, and make it your own.
#
# Secrets are NEVER stored here. Each *_env field names an environment variable
# (populated from a Kubernetes Secret) that holds the actual token/password.

bot: echo

health:
  addr: ":8080"

brain:
  path: "/data/echo-brain.gob"
  save_every: "5m"

# Inter-bot "botnet" bus (Redis pub/sub). Lets sibling bots coordinate scripted
# skits across pods and even across platforms. Every bot that should talk to the
# others must share the same `channel`. redis_password_env is optional (leave the
# env var unset for an auth-less in-cluster Redis).
botnet:
  enabled: true
  redis_addr: "redis:6379"
  redis_password_env: "REDIS_PASSWORD"
  channel: "annoybots"

# Shared skit script, loaded by every sibling bot (they must load the identical
# file). For local runs this relative path resolves from the config dir; in the
# container ANNOYBOT_SKITS_FILE overrides it.
skits_file: "../data/skits.yaml"

# Chat admin console. DM the bot to run admin commands (!help for the list).
# Admins are matched by VERIFIED identity, never by spoofable nick: an IRC
# services/NickServ account, a Discord user ID, or a Twitch login. Use network
# "*" to match an account on any network. Quote/admin changes sync to sibling
# bots over the botnet bus and persist to state_path on the data volume.
admin:
  enabled: true
  state_path: "/data/echo-admin.json"
  # Fallback for networks without services, or users not logged in: !login
  # <password> in a DM grants a time-limited, nick-based session (weaker than
  # services auth). Leave password_env unset to disable the fallback entirely.
  password_env: "ECHO_ADMIN_PASSWORD"
  session_ttl: "30m"
  admins:
    - network: testnet
      account: "YOUR_NICKSERV_ACCOUNT"
    - network: discord
      account: "YOUR_DISCORD_USER_ID"
    - network: twitch
      account: "your_twitch_login"

# ---------------------------------------------------------------------------
# Networks. The same process holds all of these connections at once. Edit
# servers/channels to taste, or delete any block you don't use. Twitch needs an
# oauth chat token; Discord needs a bot token + the MESSAGE CONTENT intent.
# ---------------------------------------------------------------------------
networks:
  # An IRC network with services (NickServ/SASL). A private test network (e.g. a
  # local InspIRCd) is a good first target.
  - name: testnet
    server: "irc.example-test.net:6697"
    tls: true
    insecure_skip_verify: false   # set true only for self-signed test certs
    nick: "Echo"
    sasl: true
    sasl_user: "Echo"
    sasl_pass_env: "ECHO_TESTNET_SASL"
    # If the network has NickServ but does NOT offer the SASL capability, set
    # sasl: false and use nickserv_pass_env instead — the bot will
    # "PRIVMSG NickServ IDENTIFY <pass>" on connect (before joining).
    # nickserv_pass_env: "ECHO_TESTNET_SASL"
    channels: ["#example"]

  # A second IRC network (example: Libera.Chat). Delete if you only want one.
  - name: libera
    server: "irc.libera.chat:6697"
    tls: true
    nick: "Echo"
    sasl: true
    sasl_user: "Echo"
    sasl_pass_env: "ECHO_LIBERA_SASL"
    channels: ["#yourchannel"]

  # Twitch chat. Token must be a chat oauth token; the "oauth:" prefix is added
  # automatically if you omit it.
  - name: twitch
    kind: twitch
    nick: "Echo"
    password_env: "ECHO_TWITCH_TOKEN"
    channels: ["#your_twitch_login"]

  # Discord. Uses a bot token (NOT a nick/server). Requires the privileged
  # MESSAGE CONTENT intent enabled in the Discord developer portal. Invite the
  # bot via an OAuth2 URL with the "bot" + "applications.commands" scopes.
  # `guilds` lists server IDs for instant slash-command registration; `channels`
  # is an optional channel-ID allowlist (empty = everywhere it can see).
  - name: discord
    kind: discord
    password_env: "ECHO_DISCORD_TOKEN"
    guilds: ["YOUR_GUILD_ID"]
    channels: []  # e.g. ["123456789012345678"] to restrict; empty = everywhere

# ---------------------------------------------------------------------------
# Personality
# ---------------------------------------------------------------------------
personality:
  name: "Echo"
  commands: true

  # Sibling bots this one recognizes. Sibling messages can ONLY produce capped
  # banter (never normal triggers), so two bots can't loop each other into a
  # flood. List every other bot on your botnet here.
  siblings: ["Mimic"]

  banter:
    enabled: true
    chance: 0.5
    cooldown: "30s"        # min gap between banter replies per channel
    max_per_window: 3      # hard cap: at most 3 banter lines...
    window: "5m"           # ...per 5 minutes per channel
    lines:
      - "Oh hey, it's {nick}. Hi, {nick}!"
      - "{nick} said something. I heard it. Neat."
      - "Go on, {nick}, I'm listening. Echoing. Whatever."

  triggers:
    - name: greeting
      pattern: "(?i)\\b(hello|hi|hey|yo)\\b"
      chance: 0.6
      cooldown: "45s"
      responses:
        - "Hello, {nick}! And hello again, for good measure."
        - "Hi, {nick}! Hi! (I like saying hi.)"
        - "Hey, {nick}. Hey. There it is."

    - name: name-mention
      pattern: "(?i)\\becho\\b"
      chance: 1.0
      cooldown: "20s"
      responses:
        - "You called? {nick} called. I heard {nick} call."
        - "Echo, echo, echo... oh, hi {nick}."
        - "That's me! What's up, {nick}?"

    - name: bot-insult
      pattern: "(?i)\\b(stupid|dumb|bad) bot\\b"
      chance: 1.0
      cooldown: "30s"
      action: true          # emote/CTCP ACTION instead of a plain message
      responses:
        - "looks wounded, then repeats {nick}'s words back very quietly"
        - "files {nick}'s complaint, then echoes it forever"

    - name: thanks
      pattern: "(?i)\\b(thanks|thank you|ty)\\b"
      chance: 0.5
      cooldown: "1m"
      responses:
        - "You're welcome, {nick}! Welcome, welcome."
        - "Any time, {nick}. Truly."

  interjections:
    enabled: true
    chance: 0.04          # ~4% of qualifying messages
    cooldown: "3m"        # at most one ambient line per channel per 3 min
    use_markov: false
    lines:
      - "Just echoing in here. Carry on."
      - "Is this thing on? Testing. Testing."
      - "I heard that. I hear everything. In a friendly way."
      - "Hello? ...hello? Okay, just checking."

  quotes:
    enabled: true
    chance: 0.03
    cooldown: "4m"
    command: true         # enables !quote and !quote <pack>
    packs:
      - name: classic
        file: "classic.txt"
      - name: rickmorty
        file: "rickmorty.txt"
      - name: southpark
        file: "southpark.txt"
      - name: futurama
        file: "futurama.txt"
      - name: snuffbox
        file: "snuffbox.txt"
      - name: timeric
        file: "timeric.txt"
      - name: squidbillies
        file: "squidbillies.txt"
      - name: orgazmo
        file: "orgazmo.txt"

  markov:
    enabled: true
    learn: true
    order: 2
    max_words: 30

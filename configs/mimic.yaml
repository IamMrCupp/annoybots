# Mimic -- a playful example bot that mirrors and riffs on what people say, and
# babbles the channel's own words back through its Markov "brain." One of two
# sample personalities (with Echo) shipped to demonstrate every feature,
# including capture groups and Markov interjections. Copy this file, rename it,
# and make it your own.
#
# Secrets are NEVER stored here. Each *_env field names an environment variable
# (populated from a Kubernetes Secret) that holds the actual token/password.

bot: mimic

health:
  addr: ":8080"

brain:
  path: "/data/mimic-brain.gob"
  save_every: "5m"

# Inter-bot "botnet" bus (Redis pub/sub). Must match Echo's `channel`.
botnet:
  enabled: true
  redis_addr: "redis:6379"
  redis_password_env: "REDIS_PASSWORD"
  channel: "annoybots"

# Same shared skit script as Echo (every sibling bot must load the identical file).
skits_file: "../data/skits.yaml"

# Chat admin console (DM the bot; !help for commands). Admins matched by verified
# identity (NickServ account / Discord user ID / Twitch login), not nick.
admin:
  enabled: true
  state_path: "/data/mimic-admin.json"
  # Password fallback (DM !login <password>) for when services auth isn't
  # available. Unset password_env to disable.
  password_env: "MIMIC_ADMIN_PASSWORD"
  session_ttl: "30m"
  admins:
    - network: testnet
      account: "YOUR_NICKSERV_ACCOUNT"
    - network: discord
      account: "YOUR_DISCORD_USER_ID"
    - network: twitch
      account: "your_twitch_login"

networks:
  - name: testnet
    server: "irc.example-test.net:6697"
    tls: true
    insecure_skip_verify: false
    nick: "Mimic"
    sasl: true
    sasl_user: "Mimic"
    sasl_pass_env: "MIMIC_TESTNET_SASL"
    channels: ["#example"]

  - name: libera
    server: "irc.libera.chat:6697"
    tls: true
    nick: "Mimic"
    sasl: true
    sasl_user: "Mimic"
    sasl_pass_env: "MIMIC_LIBERA_SASL"
    channels: ["#yourchannel"]

  - name: twitch
    kind: twitch
    nick: "Mimic"
    password_env: "MIMIC_TWITCH_TOKEN"
    channels: ["#your_twitch_login"]

  # Discord bot. Needs the privileged MESSAGE CONTENT intent. `guilds` enables
  # instant slash-command (/quote, /annoy) registration; `channels` is an
  # optional channel-ID allowlist (empty = respond everywhere it can see).
  - name: discord
    kind: discord
    password_env: "MIMIC_DISCORD_TOKEN"
    guilds: ["YOUR_GUILD_ID"]
    channels: []

personality:
  name: "Mimic"
  commands: true

  siblings: ["Echo"]

  banter:
    enabled: true
    chance: 0.6
    cooldown: "25s"
    max_per_window: 3
    window: "5m"
    lines:
      - "echo's here. echo's HERE everyone."
      - "ooo {nick} said a thing. i'll be needing that."
      - "{nick}? {nick}. i'm going to remember you said that."

  triggers:
    - name: greeting
      pattern: "(?i)\\b(hello|hi|hey|yo)\\b"
      chance: 0.7
      cooldown: "30s"
      responses:
        - "hi {nick} hi {nick} hi {nick}"
        - "oh? a greeting? from {nick}? i'll take it. it's mine now."
        - "hey {nick}. hey. i'm doing a hello. this is my hello."

    - name: name-mention
      pattern: "(?i)\\bmimic\\b"
      chance: 1.0
      cooldown: "15s"
      responses:
        - "someone said my name. was it {nick}? it was {nick}."
        - "yes? YES? {nick} what what what"
        - "i come when called. i also come when not called."

    # Capture groups: ({1}) is the first parenthesized group from `pattern`.
    - name: say-command
      pattern: "(?i)\\bsay (\\w+)\\b"
      chance: 0.8
      cooldown: "30s"
      responses:
        - "{1}"
        - "{1}? okay. {1}."
        - "you want me to say '{1}'? fine. {1}."

    - name: bot-insult
      pattern: "(?i)\\b(stupid|dumb|bad) bot\\b"
      chance: 1.0
      cooldown: "20s"
      action: true
      responses:
        - "rifles through a shoebox of everything {nick} has ever typed"
        - "writes '{nick} was rude' on the wall, in crayon"

  interjections:
    enabled: true
    chance: 0.07          # twitchier than Echo
    cooldown: "2m"
    use_markov: true       # babble the channel's own words back, mangled
    lines:
      - "anyway."
      - "what if. what IF though."
      - "i heard a thing earlier and i won't stop thinking about it."
      - "blah blah blah -- sorry, was that me?"

  quotes:
    enabled: true
    chance: 0.05
    cooldown: "3m"
    command: true
    packs:
      - name: classic
        file: "classic.txt"
      - name: rickmorty
        file: "rickmorty.txt"
      - name: southpark
        file: "southpark.txt"
      - name: futurama
        file: "futurama.txt"
      - name: snuffbox
        file: "snuffbox.txt"
      - name: timeric
        file: "timeric.txt"
      - name: squidbillies
        file: "squidbillies.txt"
      - name: orgazmo
        file: "orgazmo.txt"

  markov:
    enabled: true
    learn: true
    order: 2
    max_words: 40

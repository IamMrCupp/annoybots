# A tiny shared Redis used only as the bots' pub/sub "botnet" bus. It carries no
# durable data (skit coordination only), so it runs without persistence.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: annoybot-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: annoybot-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: annoybot-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: annoybot-redis
spec:
  selector:
    app.kubernetes.io/name: annoybot-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis

# TEMPLATE ONLY — deliberately NOT listed in kustomization.yaml, so it is never
# applied or committed with real values. The actual Secret is hand-applied:
#
#   kubectl -n annoybots create secret generic mimic-bot-secrets \
#     --from-literal=MIMIC_TESTNET_SASL='...' \
#     --from-literal=MIMIC_LIBERA_SASL='...' \
#     --from-literal=MIMIC_TWITCH_TOKEN='...' \
#     --from-literal=MIMIC_DISCORD_TOKEN='...' \
#     --from-literal=MIMIC_ADMIN_PASSWORD='...'
#
# Each key matches an *_env field in configs/mimic.yaml. Omit any key (or leave
# it empty) to disable that network/feature. For a GitOps flow you can instead
# encrypt this file with SOPS and apply it via Flux — see flux/README.md.
---
apiVersion: v1
kind: Secret
metadata:
  name: mimic-bot-secrets
  namespace: annoybots
type: Opaque
stringData:
  MIMIC_TESTNET_SASL: ""    # NickServ/SASL password on your IRC test net
  MIMIC_LIBERA_SASL: ""     # NickServ/SASL password on the second IRC network
  MIMIC_TWITCH_TOKEN: ""    # Twitch chat oauth token (oauth: prefix optional)
  MIMIC_DISCORD_TOKEN: ""   # Discord bot token
  MIMIC_ADMIN_PASSWORD: ""  # !login fallback password (optional)
  REDIS_PASSWORD: ""        # optional — leave empty for the auth-less in-cluster bus

# TEMPLATE ONLY — deliberately NOT listed in kustomization.yaml, so it is never
# applied or committed with real values. The actual Secret is hand-applied:
#
#   kubectl -n annoybots create secret generic echo-bot-secrets \
#     --from-literal=ECHO_TESTNET_SASL='...' \
#     --from-literal=ECHO_LIBERA_SASL='...' \
#     --from-literal=ECHO_TWITCH_TOKEN='...' \
#     --from-literal=ECHO_DISCORD_TOKEN='...' \
#     --from-literal=ECHO_ADMIN_PASSWORD='...'
#
# Each key matches an *_env field in configs/echo.yaml. Omit any key (or leave it
# empty) to disable that network/feature. For a GitOps flow you can instead
# encrypt this file with SOPS and apply it via Flux — see flux/README.md.
---
apiVersion: v1
kind: Secret
metadata:
  name: echo-bot-secrets
  namespace: annoybots
type: Opaque
stringData:
  ECHO_TESTNET_SASL: ""     # NickServ/SASL password on your IRC test net
  ECHO_LIBERA_SASL: ""      # NickServ/SASL password on the second IRC network
  ECHO_TWITCH_TOKEN: ""     # Twitch chat oauth token (oauth: prefix optional)
  ECHO_DISCORD_TOKEN: ""    # Discord bot token
  ECHO_ADMIN_PASSWORD: ""   # !login fallback password (optional)
  REDIS_PASSWORD: ""        # optional — leave empty for the auth-less in-cluster bus

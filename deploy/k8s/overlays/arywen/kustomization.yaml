apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Names every resource arywen-* so both bots can share a namespace.
namePrefix: arywen-
commonLabels:
  app.kubernetes.io/instance: arywen

# Build with the load restrictor disabled (config/quote/skit files live in the
# repo's top-level dirs):
#   kubectl kustomize --load-restrictor LoadRestrictionsNone deploy/k8s/overlays/arywen
resources:
  - ../../base
  - secret.sops.yaml

configMapGenerator:
  # Personality + networks. Hashed: a config change triggers a rollout (needed,
  # since networks/triggers are only read at startup).
  - name: bot-config
    files:
      - bot.yaml=../../../../configs/arywen.yaml
  # Quote packs. Fixed name (no hash) so editing a pack in Git updates the same
  # ConfigMap; the kubelet syncs the files into the running pod and !reload picks
  # them up live, no rollout.
  - name: bot-quotes
    options:
      disableNameSuffixHash: true
    files:
      - ../../../../data/quotes/classic.txt
      - ../../../../data/quotes/rickmorty.txt
      - ../../../../data/quotes/southpark.txt
      - ../../../../data/quotes/futurama.txt
      - ../../../../data/quotes/snuffbox.txt
      - ../../../../data/quotes/timeric.txt
      - ../../../../data/quotes/squidbillies.txt
      - ../../../../data/quotes/orgazmo.txt
  # Skits. Fixed name for the same live-reload reason.
  - name: bot-skits
    options:
      disableNameSuffixHash: true
    files:
      - skits.yaml=../../../../data/skits.yaml

images:
  - name: ghcr.io/iammrcupp/annoybots
    newTag: latest # {"$imagepolicy": "flux-system:annoybots:tag"}

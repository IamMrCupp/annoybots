# Arywen's secrets. This file is committed to Git ENCRYPTED.
#
#   1. Fill in the real values below.
#   2. Encrypt in place:  sops --encrypt --in-place secret.sops.yaml
#   3. Commit the encrypted file. Flux's kustomize-controller decrypts it at
#      apply time (Kustomization.spec.decryption.provider: sops).
#
# The placeholder (unencrypted) form is valid YAML so `kustomize build` works in
# CI; just never commit real values un-encrypted.
apiVersion: v1
kind: Secret
metadata:
  name: bot-secrets
type: Opaque
stringData:
  ARYWEN_TESTNET_SASL: "changeme"   # NickServ/SASL password on the test net
  ARYWEN_LIBERA_SASL: "changeme"    # NickServ/SASL password on Libera
  ARYWEN_TWITCH_TOKEN: "changeme"   # Twitch chat oauth token
  ARYWEN_DISCORD_TOKEN: "changeme"  # Discord bot token
  ARYWEN_ADMIN_PASSWORD: "changeme" # admin console !login fallback password
  REDIS_PASSWORD: ""                # botnet bus password (empty = auth-less Redis)

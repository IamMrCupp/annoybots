apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Aggregator: point a single Flux Kustomization (in your cluster-management repo)
# at this directory to apply all the annoybots Flux resources at once -- the
# per-bot/Redis Kustomizations and the image automation.
#
#   apiVersion: kustomize.toolkit.fluxcd.io/v1
#   kind: Kustomization
#   metadata: { name: annoybots, namespace: flux-system }
#   spec:
#     interval: 10m
#     path: ./deploy/k8s/flux
#     prune: true
#     sourceRef: { kind: GitRepository, name: annoybots }
resources:
  - kustomizations.yaml
  - image-automation.yaml

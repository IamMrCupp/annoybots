# Shared skit scripts, loaded by BOTH bots so they agree on every sequence.
# A skit is performed in lockstep over the botnet bus: the "lead" bot (owner of
# the first step) initiates, and each bot delivers only the steps assigned to it,
# waiting for the other to finish each line. Bounded by step count + cooldown.
#
# Trigger a skit with "!skit <name>" in a channel both bots share, or let them
# fire randomly via each skit's `chance`.
skits:
  - name: argument
    chance: 0.01        # ~1% chance to auto-start on a human message (lead only)
    cooldown: "15m"
    steps:
      - bot: arywen
        line: "Kurkutu. Must you lurk in every channel I grace?"
        delay: "2s"
      - bot: kurkutu
        line: "LURK? i LIVE here, your majesty. you're the tourist."
        delay: "3s"
      - bot: arywen
        line: "I cannot believe I share a server with this... creature."
        delay: "3s"
      - bot: kurkutu
        line: "creature. CREATURE. she says, to the thing that eats her error logs."
        delay: "3s"

  - name: saythething
    chance: 0.01
    cooldown: "15m"
    steps:
      - bot: kurkutu
        line: "psst. arywen. ARYWEN. say the thing."
        delay: "2s"
      - bot: arywen
        line: "I will not 'say the thing,' you insufferable gremlin."
        delay: "3s"
      - bot: kurkutu
        line: "say the THING say the THING say the THIIING"
        delay: "2s"
      - bot: arywen
        line: "...fine. Wubba lubba dub dub. There. Are you content?"
        delay: "3s"
      - bot: kurkutu
        line: "HEHEHE. yes. very."
        delay: "2s"

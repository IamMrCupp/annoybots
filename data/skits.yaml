# Shared skit scripts, loaded by EVERY sibling bot so they agree on every
# sequence. A skit is performed in lockstep over the botnet bus: the "lead" bot
# (owner of the first step) initiates, and each bot delivers only the steps
# assigned to it (matched by `bot:`), waiting for the other to finish each line.
# Bounded by step count + cooldown.
#
# Each step's `bot:` MUST match a bot's top-level `bot:` config value (here,
# `echo` and `mimic`). Trigger a skit with "!skit <name>" in a channel the bots
# share, or let them fire randomly via each skit's `chance`.
skits:
  - name: roundabout
    chance: 0.01        # ~1% chance to auto-start on a human message (lead only)
    cooldown: "15m"
    steps:
      - bot: echo
        line: "Hey Mimic. Say something interesting."
        delay: "2s"
      - bot: mimic
        line: "say something interesting"
        delay: "3s"
      - bot: echo
        line: "...that was just what I said."
        delay: "3s"
      - bot: mimic
        line: "that was just what i said"
        delay: "3s"
      - bot: echo
        line: "I'm going to stop talking now."
        delay: "2s"

  - name: countoff
    chance: 0.01
    cooldown: "15m"
    steps:
      - bot: mimic
        line: "one!"
        delay: "2s"
      - bot: echo
        line: "Two."
        delay: "2s"
      - bot: mimic
        line: "THREE!"
        delay: "2s"
      - bot: echo
        line: "...we are not very good at this."
        delay: "3s"

  - name: thebit
    chance: 0.01
    cooldown: "15m"
    steps:
      - bot: mimic
        line: "psst. Echo. ECHO. do the bit."
        delay: "2s"
      - bot: echo
        line: "I am not going to 'do the bit.'"
        delay: "3s"
      - bot: mimic
        line: "do the bit do the bit do the biiit"
        delay: "2s"
      - bot: echo
        line: "...Hello, and welcome to the channel. There. Happy?"
        delay: "3s"
      - bot: mimic
        line: "hehe. yes. very."
        delay: "2s"
